<!DOCTYPE html>
<html lang="en">
<head>
<title>Pacific Trails Resort :: Yurts Packages</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Select Pacific Trails Resort trip packages and calculate your trip's cost!"/>
<link href="pacific.css" rel="stylesheet">
<script>
  function calculateTotal() {
    let total = 0;
    if (document.getElementById("weekend").checked) {
      total += 449.99;
    }
    if (document.getElementById("zen").checked) {
      total += 599.99;
    }
    if (document.getElementById("kayak").checked) {
      total += 499.99;
    }
    alert("your total package price is $" + total.toFixed(2));
    return false;
  }
</script>
</head>
<body>
<header>
  <h1><a href="index.html">Pacific Trails Resort</a></h1>
</header>
<nav>
  <ul>
  <li><a href="index.html">Home</a></li>
  <li><a href="yurts.html">Yurts</a></li>
  <li><a href="yurtsPackages.html">Yurts Packages</a></li>
  <li><a href="activities.html">Activities</a></li>
  <li><a href="reservations.html">Reservations</a></li>
  </ul>
</nav>
<div id = "wrapper">
<div id = "yurthero"></div>
<main>
 <h2>Trip Packages</h2>
 <p>Select one or more packages to calculate your total price</p>
<form onsubmit="return calculateTotal();">
  <p>
    <input type="checkbox" id="weekend" name="weekend" value="449.99">
    <label for="weekend">Weekend Escape - $449.99</label>
  </p>
  <p>
    <input type="checkbox" id="zen" name="zen" value="599.99">
    <label for="zen">Zen Retreat - $599.99</label>
  </p>
  <p>
    <input type="checkbox" id="kayak" name="kayak" value="499.99">
    <label for="kayak">Kayak Away - $499.99</label>
  </p>
  <input type="submit" value="Calculate Total">
</form>
</main>
<footer>
  Copyright &copy; 2020 Pacific Trails Resort<br>
  <a href="mailto:noah@bundus.com">noah@bundus.com</a>
</footer>
</div>
</body>
</html>
